<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Horizon Shop | Official</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --neon: #00d2ff;
            --deep: #050a14;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 210, 255, 0.2);
        }

        body {
            background-color: var(--deep);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #102a43 0%, #050a14 100%);
            overflow-x: hidden;
        }

        .main-logo {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 60px;
            filter: drop-shadow(0 0 15px var(--neon));
            z-index: 100;
        }
        
        #admin-btn {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
            background: rgba(231, 76, 60, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        /* Category Navigation */
        .nav-categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn-cat {
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 25px;
            border-radius: 15px;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 13px;
        }

        .btn-cat.active {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 20px var(--neon);
            border-color: var(--neon);
        }

        #welcome-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 12vw, 6rem);
            background: linear-gradient(to bottom, #fff 40%, var(--neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            line-height: 1;
        }

        .card-rank {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px 20px;
            transition: 0.5s;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .card-rank:hover {
            border-color: var(--neon);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .btn-main {
            background: linear-gradient(45deg, #0072ff, #00d2ff);
            border: none;
            color: white;
            font-weight: 800;
            padding: 15px 45px;
            border-radius: 50px;
            letter-spacing: 2px;
        }

        .modal-content {
            background: rgba(10,20,40,0.98);
            backdrop-filter: blur(25px);
            border: 1px solid var(--neon);
            border-radius: 35px;
        }

        .empty-state {
            padding: 50px;
            text-align: center;
            opacity: 0.5;
            border: 2px dashed var(--border);
            border-radius: 30px;
        }
    </style>
</head>
<body>

    <img src="https://files.catbox.moe/88zycr.png" class="main-logo animate__animated animate__fadeInDown" alt="Logo">

    <a href="https://wa.me/6283129480910?text=Halo%20Admin%2C%20saya%20sudah%20melakukan%20pembayaran" id="admin-btn" target="_blank">
        🚨 LAPOR ADMIN
    </a>

    <div id="welcome-page">
        <h1 class="hero-title animate__animated animate__backInDown">PRIME<br>HORIZON</h1>
        <p class="animate__animated animate__fadeIn animate__delay-1s opacity-50 fw-bold">OFFICIAL MINECRAFT SCHOOL SHOP</p>
        <div class="mt-5 animate__animated animate__zoomIn animate__delay-1s">
            <button class="btn-main" onclick="masukKeToko()">ENTER STORE</button>
        </div>
    </div>

    <div id="shop-page" class="container py-5" style="display: none;">
        <div class="text-center mb-5">
            <h2 class="fw-black display-4">PRIME <span style="color: var(--neon)">SHOP</span></h2>
        </div>

        <div class="nav-categories animate__animated animate__fadeIn">
            <button class="btn-cat active" onclick="filterCategory('rank', this)">Rank</button>
            <button class="btn-cat" onclick="filterCategory('item', this)">Item</button>
            <button class="btn-cat" onclick="filterCategory('key', this)">Key</button>
            <button class="btn-cat" onclick="filterCategory('tag', this)">Tag</button>
        </div>
        
        <div class="row g-4 justify-content-center" id="product-container">
            </div>
        
        <footer class="text-center mt-5 opacity-25 small">
            <p>&copy; 2026 PRIME HORIZON SCHOOL. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>

    <div class="modal fade" id="modalBeli" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-body text-white">
                    <h4 class="fw-black text-center mb-4" id="judulProduk" style="color: var(--neon);">BELI</h4>
                    <input type="text" id="mc_user" class="form-control bg-transparent text-white border-info p-3 mb-3" placeholder="Nickname Minecraft">
                    <div class="row g-2">
                        <div class="col-6">
                            <select id="mc_version" class="form-select bg-transparent text-white border-info p-3">
                                <option value="Java">Java (PC)</option>
                                <option value="Bedrock">Bedrock (HP)</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <select id="payment" class="form-select bg-transparent text-white border-info p-3">
                                <option value="DANA">DANA</option>
                                <option value="GOPAY">GOPAY</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-main w-100 mt-4 py-3" onclick="prosesBayar()">BAYAR SEKARANG</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const NO_HP = "083129480910";
        
        const data = {
            rank: [
                {n: "OSIS", h: "Rp:5.000"}, {n: "Murid Kesayangan", h: "Rp:10.000"},
                {n: "Murid Juara", h: "Rp:15.000"}, {n: "Wakil OSIS", h: "Rp:20.000"},
                {n: "Ketua OSIS", h: "Rp:30.000"}, {n: "Wakil Kepala Sekolah", h: "Rp:50.000"}
            ],
            item: [],
            key: [],
            tag: []
        };

        function filterCategory(cat, btn) {
            // Update Button UI
            document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const container = document.getElementById('product-container');
            container.innerHTML = "";

            if (data[cat].length === 0) {
                container.innerHTML = `<div class="empty-state animate__animated animate__fadeIn"><h3>Belum Tersedia</h3><p>Kategori ${cat} akan segera hadir!</p></div>`;
                return;
            }

            data[cat].forEach((item, i) => {
                container.innerHTML += `
                    <div class="col-6 col-lg-4 animate__animated animate__fadeInUp" style="animation-delay: ${i*0.1}s">
                        <div class="card-rank text-center">
                            <h4 class="fw-black mb-2">${item.n}</h4>
                            <h5 class="text-info fw-bold mb-4">Rp ${item.h}</h5>
                            <button class="btn btn-outline-info w-100 rounded-pill fw-bold" onclick="bukaModal('${item.n}', '${item.h}')">ORDER</button>
                        </div>
                    </div>
                `;
            });
        }

        function masukKeToko() {
            document.getElementById('welcome-page').style.display = 'none';
            document.getElementById('shop-page').style.display = 'block';
            document.getElementById('admin-btn').style.display = 'block';
            filterCategory('rank', document.querySelector('.btn-cat'));
        }

        let pNama, pHarga;
        function bukaModal(n, h) {
            pNama = n; pHarga = h;
            document.getElementById('judulProduk').innerText = "BELI " + n.toUpperCase();
            new bootstrap.Modal(document.getElementById('modalBeli')).show();
        }

        function prosesBayar() {
            const user = document.getElementById('mc_user').value;
            if(!user) return Swal.fire('Oops!', 'Isi Nickname dulu!', 'warning');

            bootstrap.Modal.getInstance(document.getElementById('modalBeli')).hide();

            Swal.fire({
                title: 'Konfirmasi Bayar',
                html: `<div style="background:white; padding:10px; border-radius:10px; display:inline-block; margin-bottom:10px;">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wa.me/6283129480910" style="width:150px">
                </div><br>Transfer <b>Rp ${pHarga}</b> ke:<br><h3 class="text-info">${NO_HP}</h3>`,
                confirmButtonText: 'SAYA SUDAH BAYAR'
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
