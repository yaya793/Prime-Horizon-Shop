<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Horizon Shop | Official</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --neon: #00d2ff;
            --deep: #050a14;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 210, 255, 0.2);
        }

        body {
            background-color: var(--deep);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #102a43 0%, #050a14 100%);
            overflow-x: hidden;
        }

        /* Logo & Header */
        .main-logo {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 60px;
            filter: drop-shadow(0 0 15px var(--neon));
            z-index: 100;
            transition: 0.5s;
        }
        
        /* Floating Admin Button - Desktop Optimization */
        #admin-btn {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
            background: rgba(231, 76, 60, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }
        #admin-btn:hover { background: #ff4757; transform: scale(1.05); color: white; }

        /* Welcome Page Hero */
        #welcome-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 12vw, 6rem); /* Lebih besar di laptop */
            background: linear-gradient(to bottom, #fff 40%, var(--neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 10px;
        }

        /* Card Layout for Desktop (3 Columns) */
        .card-rank {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px 20px;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .card-rank:hover {
            background: rgba(0, 210, 255, 0.05);
            border-color: var(--neon);
            transform: translateY(-15px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 30px rgba(0,210,255,0.1);
        }

        /* Custom Button */
        .btn-main {
            background: linear-gradient(45deg, #0072ff, #00d2ff);
            border: none;
            color: white;
            font-weight: 800;
            padding: 15px 45px;
            border-radius: 50px;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,210,255,0.5); }

        /* Modal Desktop Size */
        .modal-content {
            background: rgba(10,20,40,0.98);
            backdrop-filter: blur(25px);
            border: 1px solid var(--neon);
            border-radius: 35px;
        }

        /* SweetAlert Custom for Desktop */
        .swal2-popup-custom {
            background: #0a1428 !important;
            border: 1px solid var(--neon) !important;
            border-radius: 25px !important;
        }
    </style>
</head>
<body>

    <img src="https://files.catbox.moe/88zycr.png" class="main-logo animate__animated animate__fadeInDown" alt="Logo">

    <a href="https://wa.me/6281234567890?text=Halo%20Admin%20Prime%20Horizon%2C%20saya%20butuh%20bantuan" id="admin-btn" target="_blank">
        🚨 LAPOR ADMIN
    </a>

    <div id="welcome-page">
        <h1 class="hero-title animate__animated animate__backInDown">PRIME<br>HORIZON</h1>
        <p class="animate__animated animate__fadeIn animate__delay-1s opacity-50 fw-bold" style="letter-spacing: 5px;">OFFICIAL MINECRAFT SCHOOL SHOP</p>
        <div class="mt-5 animate__animated animate__zoomIn animate__delay-1s">
            <button class="btn-main" onclick="masukKeToko()">ENTER STORE</button>
        </div>
    </div>

    <div id="shop-page" class="container py-5" style="display: none;">
        <div class="text-center mb-5 animate__animated animate__fadeIn">
            <h2 class="fw-black display-4">PRIME <span style="color: var(--neon)">SHOP</span></h2>
            <div style="width: 80px; height: 4px; background: var(--neon); margin: 15px auto; border-radius: 10px;"></div>
        </div>
        
        <div class="row g-4 justify-content-center" id="daftar-rank"></div>
        
        <footer class="text-center mt-5 opacity-25 small">
            <p>&copy; 2026 PRIME HORIZON SCHOOL. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>

    <div class="modal fade" id="modalBeli" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3 shadow-lg">
                <div class="modal-body text-white">
                    <h4 class="fw-black text-center mb-4" id="judulProduk" style="color: var(--neon);">BELI</h4>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="small fw-bold opacity-50 mb-2">NICKNAME MINECRAFT</label>
                            <input type="text" id="mc_user" class="form-control bg-transparent text-white border-info p-3 shadow-none" placeholder="Contoh: Zayrox_Player">
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold opacity-50 mb-2">PLATFORM/VERSI</label>
                            <select id="mc_version" class="form-select bg-transparent text-white border-info p-3 shadow-none">
                                <option value="Java Edition">Java Edition (PC)</option>
                                <option value="Bedrock / MCPE">Bedrock / MCPE (HP)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold opacity-50 mb-2">METODE PEMBAYARAN</label>
                            <select id="payment" class="form-select bg-transparent text-white border-info p-3 shadow-none">
                                <option value="DANA">DANA</option>
                                <option value="GOPAY">GOPAY</option>
                                <option value="OVO">OVO</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button class="btn btn-main w-100 py-3" onclick="prosesBayar()">BAYAR SEKARANG</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WA_ADMIN = "6281234567890"; 
        let pNama = "", pHarga = "";

        const ranks = [
            {n: "OSIS", h: "5K"}, {n: "Murid Kesayangan", h: "10K"},
            {n: "Murid Juara", h: "15K"}, {n: "Wakil OSIS", h: "20K"},
            {n: "Ketua OSIS", h: "30K"}, {n: "WAKIL KEPALA SEKOLAH 👑", h: "50K"}
        ];

        const container = document.getElementById('daftar-rank');
        ranks.forEach((r, i) => {
            container.innerHTML += `
                <div class="col-6 col-lg-4 animate__animated animate__fadeInUp" style="animation-delay: ${i * 0.1}s">
                    <div class="card-rank text-center">
                        <h4 class="fw-black mb-2">${r.n}</h4>
                        <h5 class="text-info fw-bold mb-4">Rp ${r.h}</h5>
                        <button class="btn btn-outline-info w-100 rounded-pill fw-bold py-2" onclick="bukaModal('${r.n}', '${r.h}')">ORDER NOW</button>
                    </div>
                </div>
            `;
        });

        function masukKeToko() {
            document.getElementById('welcome-page').classList.add('animate__animated', 'animate__fadeOut');
            setTimeout(() => {
                document.getElementById('welcome-page').style.display = 'none';
                document.getElementById('shop-page').style.display = 'block';
                document.getElementById('admin-btn').style.display = 'block';
            }, 600);
        }

        function bukaModal(n, h) {
            pNama = n; pHarga = h;
            document.getElementById('judulProduk').innerText = "BELI " + n.toUpperCase();
            new bootstrap.Modal(document.getElementById('modalBeli')).show();
        }

        function prosesBayar() {
            const user = document.getElementById('mc_user').value;
            const payMethod = document.getElementById('payment').value;

            if(!user) {
                Swal.fire({
                    title: 'Peringatan!',
                    text: 'Silahkan isi Nickname Minecraft kamu.',
                    icon: 'warning',
                    customClass: { popup: 'swal2-popup-custom' },
                    confirmButtonColor: '#00d2ff'
                });
                return;
            }

            bootstrap.Modal.getInstance(document.getElementById('modalBeli')).hide();

            Swal.fire({
                title: 'Membuka Pembayaran',
                text: 'Silahkan selesaikan transaksi di aplikasi ' + payMethod,
                icon: 'info',
                timer: 3000,
                showConfirmButton: false,
                customClass: { popup: 'swal2-popup-custom' }
            });

            let link = payMethod === "DANA" ? "dana://" : payMethod === "GOPAY" ? "gojek://gopay" : "ovo://";
            setTimeout(() => { window.location.href = link; }, 2000);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
